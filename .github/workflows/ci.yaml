name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel in-progress runs for the same PR when new commits are pushed
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  app:
    name: Build, Test & Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency audit
        run: pnpm audit --audit-level moderate

      - name: Typecheck
        run: pnpm tsc --noEmit

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Build Lambdas
        run: pnpm build:lambdas

      - name: Zip Lambda artifacts
        run: |
          mkdir -p dist/artifacts
          for dir in dist/lambdas/*/; do
            fn=$(basename "$dir")
            (cd "$dir" && zip -r "../../../dist/artifacts/${fn}.zip" .)
          done

      - name: Static export
        env:
          NEXT_PUBLIC_API_BASE_URL: https://api.cashight.nghuy.link
          NEXT_PUBLIC_COGNITO_AUTHORITY: https://cognito-idp.ap-southeast-1.amazonaws.com/ap-southeast-1_ci
          NEXT_PUBLIC_COGNITO_CLIENT_ID: ci-placeholder-client-id
          NEXT_PUBLIC_APP_ORIGIN: https://next.cashight.nghuy.link
        run: NODE_OPTIONS=--disable-warning=DEP0205 pnpm build

      - name: Verify static export
        run: pnpm verify:static

      - name: Upload Lambda artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lambda-artifacts-${{ github.sha }}
          path: dist/artifacts/*.zip
          retention-days: 30
          if-no-files-found: error

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-export-${{ github.sha }}
          path: out/
          retention-days: 30
          if-no-files-found: error
