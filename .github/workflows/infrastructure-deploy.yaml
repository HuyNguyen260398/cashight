name: Infrastructure Deploy

on:
  workflow_dispatch:
    inputs:
      action:
        description: "'plan' previews changes; 'apply' deploys after approval"
        required: true
        type: choice
        options: [plan, apply]
        default: plan

# Both jobs need id-token to assume the IAM role via GitHub OIDC.
permissions:
  contents: read
  id-token: write

defaults:
  run:
    working-directory: terraform

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4
        with:
          working-directory: ${{ github.workspace }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_INFRA_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: "1.15.2"
          terraform_wrapper: false

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform plan
        run: |
          terraform plan \
            -input=false \
            -no-color \
            -out=tfplan.bin \
            2>&1 | tee /tmp/tfplan.txt
          echo "::group::Plan summary"
          grep -E "^Plan:|^No changes\." /tmp/tfplan.txt || true
          echo "::endgroup::"

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.sha }}
          path: terraform/tfplan.bin
          retention-days: 7
          if-no-files-found: error

  apply:
    name: Terraform Apply
    if: ${{ inputs.action == 'apply' }}
    needs: plan
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_INFRA_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: "1.15.2"
          terraform_wrapper: false

      - name: Terraform init
        run: terraform init -input=false

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.sha }}
          path: terraform

      - name: Terraform apply
        run: |
          terraform apply \
            -input=false \
            -no-color \
            tfplan.bin
