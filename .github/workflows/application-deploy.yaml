name: Application Deploy

# Deploys Lambda canaries and frontend from a specific CI run's artifacts.
# The ci_run_id input pins the exact artifact set so plan and apply are
# always identical even when new commits land on main mid-deploy.
on:
  workflow_dispatch:
    inputs:
      ci_run_id:
        description: "GitHub Actions run ID from the CI workflow to deploy"
        required: true
        type: string

permissions:
  contents: read
  id-token: write
  actions: read # download artifacts from other workflow runs

jobs:
  # ── Backend: Lambda canary deployment ───────────────────────────────────────
  deploy-backend:
    name: Deploy Lambda Canaries
    runs-on: ubuntu-latest
    environment: production
    env:
      AWS_REGION: ap-southeast-1
      CI_RUN_ID: ${{ inputs.ci_run_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4

      # CI only runs on pull_request, where github.sha is an ephemeral merge-preview
      # commit that never matches any commit reachable from main. That SHA is what
      # got baked into the artifact names when CI uploaded them, so this workflow's
      # own github.sha (main's HEAD at dispatch time) can never match either. Resolve
      # both the real source commit and the actual artifact names from the CI run.
      - name: Resolve CI run artifacts
        id: ci
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          RUN_ID="${{ inputs.ci_run_id }}"
          SHA=$(gh api "repos/${REPO}/actions/runs/${RUN_ID}" --jq .head_sha)
          ARTIFACTS_JSON=$(gh api "repos/${REPO}/actions/runs/${RUN_ID}/artifacts")
          LAMBDA_ARTIFACT=$(echo "${ARTIFACTS_JSON}" | jq -r '[.artifacts[] | select(.name | startswith("lambda-artifacts-"))][0].name // empty')
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "lambda_artifact=${LAMBDA_ARTIFACT}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Download Lambda artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ steps.ci.outputs.lambda_artifact }}
          path: dist/artifacts
          run-id: ${{ inputs.ci_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Lambda zips to S3
        run: |
          for zip in dist/artifacts/*.zip; do
            fn=$(basename "$zip" .zip)
            echo "Uploading ${fn}.zip to s3://${ARTIFACTS_BUCKET}/lambdas/${GIT_SHA}/${fn}.zip"
            aws s3 cp "$zip" "s3://${ARTIFACTS_BUCKET}/lambdas/${GIT_SHA}/${fn}.zip"
          done
        env:
          ARTIFACTS_BUCKET: ${{ vars.ARTIFACTS_BUCKET }}
          GIT_SHA: ${{ steps.ci.outputs.sha }}

      - name: Update Lambda functions and deploy canaries
        run: |
          set -euo pipefail
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          FUNCTIONS=(auth-guard uploads-api upload-status-api parser-worker statements-api dashboard-api summary-api)
          DEPLOY_IDS=()

          for fn in "${FUNCTIONS[@]}"; do
            FUNCTION="cashight-${fn}"
            echo "=== Deploying ${FUNCTION} ==="

            # Update code and publish a new version
            NEW_ARN=$(aws lambda update-function-code \
              --function-name "${FUNCTION}" \
              --s3-bucket "${ARTIFACTS_BUCKET}" \
              --s3-key "lambdas/${GIT_SHA}/${fn}.zip" \
              --publish \
              --query FunctionArn \
              --output text)
            echo "  New version ARN: ${NEW_ARN}"

            # Wait for the update to propagate before publishing canary traffic
            aws lambda wait function-updated --function-name "${FUNCTION}"

            # Resolve the version the live alias currently points to.
            # NOTE: CodeDeploy's Lambda AppSpec wants bare version numbers here
            # (e.g. "1", "2"), not ARNs — passing ARNs fails every deployment
            # with INVALID_LAMBDA_CONFIGURATION before any traffic shifts.
            NEW_VER="${NEW_ARN##*:}"
            CURRENT_VER=$(aws lambda get-alias \
              --function-name "${FUNCTION}" --name live \
              --query FunctionVersion --output text)
            echo "  Current alias version: ${CURRENT_VER}, target version: ${NEW_VER}"

            # Build inline AppSpec for CodeDeploy
            APPSPEC=$(jq -cn \
              --arg name "${FUNCTION}" \
              --arg current "${CURRENT_VER}" \
              --arg target "${NEW_VER}" \
              '{version:"0.0",Resources:[{FunctionAlias:{Type:"AWS::Lambda::Function",Properties:{Name:$name,Alias:"live",CurrentVersion:$current,TargetVersion:$target}}}]}')

            REVISION=$(jq -n --arg content "${APPSPEC}" \
              '{"revisionType":"AppSpecContent","appSpecContent":{"content":$content}}')

            # NOTE: the CLI service name for CodeDeploy is "deploy", not "codedeploy".
            DEPLOY_ID=$(aws deploy create-deployment \
              --application-name "${FUNCTION}" \
              --deployment-group-name "${FUNCTION}-live" \
              --revision "${REVISION}" \
              --query deploymentId \
              --output text)
            echo "  CodeDeploy deployment: ${DEPLOY_ID}"
            DEPLOY_IDS+=("${DEPLOY_ID}")
          done

          # Wait for all canary deployments to succeed before allowing frontend
          echo "=== Waiting for canary deployments ==="
          for deploy_id in "${DEPLOY_IDS[@]}"; do
            echo "  Waiting for ${deploy_id}..."
            aws deploy wait deployment-successful \
              --deployment-id "${deploy_id}"
            echo "  ${deploy_id}: SUCCEEDED"
          done
          echo "All Lambda canary deployments succeeded"
        env:
          ARTIFACTS_BUCKET: ${{ vars.ARTIFACTS_BUCKET }}
          GIT_SHA: ${{ steps.ci.outputs.sha }}

  # ── Frontend: atomic S3 + CloudFront deployment ──────────────────────────────
  deploy-frontend:
    name: Deploy Frontend
    needs: deploy-backend
    runs-on: ubuntu-latest
    environment: production
    env:
      AWS_REGION: ap-southeast-1

    steps:
      - name: Resolve CI run commit
        id: ci
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          SHA=$(gh api "repos/${{ github.repository }}/actions/runs/${{ inputs.ci_run_id }}" --jq .head_sha)
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"

      # Pinned to the exact commit CI tested (not main's HEAD at dispatch
      # time), so the production build matches what CI validated.
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4
        with:
          ref: ${{ steps.ci.outputs.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ci.yaml's "Static export" step only builds `out/` to exercise
      # `pnpm verify:static` — it uses placeholder Cognito values and must
      # never be deployed. Rebuild here with real production values so users
      # get the real Cognito authority/client instead of a fake one.
      - name: Static export (production)
        env:
          NEXT_PUBLIC_API_BASE_URL: https://api.cashight.nghuy.link
          NEXT_PUBLIC_COGNITO_AUTHORITY: ${{ vars.COGNITO_AUTHORITY }}
          NEXT_PUBLIC_COGNITO_CLIENT_ID: ${{ vars.COGNITO_SPA_CLIENT_ID }}
          NEXT_PUBLIC_APP_ORIGIN: https://cashight.nghuy.link
        run: NODE_OPTIONS=--disable-warning=DEP0205 pnpm build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Deploy frontend to S3 + CloudFront
        run: node scripts/deploy-frontend.mjs
        env:
          FRONTEND_BUCKET: ${{ vars.FRONTEND_BUCKET }}
          CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}

      # Release-manifest job records checksums of what was actually deployed —
      # hand it this real build rather than letting it fall back to CI's
      # placeholder-baked export.
      - name: Upload production frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-export-prod-${{ github.run_id }}
          path: out/
          retention-days: 1

  # ── Smoke tests ───────────────────────────────────────────────────────────────
  smoke-tests:
    name: Smoke Tests
    needs: [deploy-backend, deploy-frontend]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: 24

      - name: Run smoke tests
        run: node scripts/smoke-serverless.mjs
        env:
          APP_URL: https://next.cashight.nghuy.link
          API_URL: https://api.cashight.nghuy.link

  # ── Release manifest ─────────────────────────────────────────────────────────
  release-manifest:
    name: Record Release Manifest
    needs: smoke-tests
    runs-on: ubuntu-latest
    environment: production
    env:
      AWS_REGION: ap-southeast-1

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4

      - name: Resolve CI run commit
        id: ci
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          SHA=$(gh api "repos/${{ github.repository }}/actions/runs/${{ inputs.ci_run_id }}" --jq .head_sha)
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-1

      # Downloads the real production build uploaded by deploy-frontend in
      # this same run — not ci.yaml's placeholder-baked export — so checksums
      # reflect what was actually deployed.
      - name: Download frontend artifact (for checksums)
        uses: actions/download-artifact@v4
        with:
          name: frontend-export-prod-${{ github.run_id }}
          path: out

      - name: Create and upload release manifest
        run: node scripts/create-release-manifest.mjs
        env:
          ARTIFACTS_BUCKET: ${{ vars.ARTIFACTS_BUCKET }}
          CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
          GIT_SHA: ${{ steps.ci.outputs.sha }}
