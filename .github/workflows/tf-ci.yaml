name: Terraform CI

on:
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same PR when new commits are pushed
concurrency:
  group: tf-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    working-directory: terraform

jobs:
  terraform:
    name: Format, Validate & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.2"
          terraform_wrapper: false

      - name: Terraform fmt (check)
        run: terraform fmt -check -recursive -diff

      # -backend=false: validation needs no remote state / AWS credentials.
      - name: Terraform init (no backend)
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate -no-color

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: TFLint
        run: |
          tflint --init
          tflint --no-color -f compact
