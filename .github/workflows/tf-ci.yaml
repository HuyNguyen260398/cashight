name: Terraform CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'terraform/**'
      - '.github/workflows/tf-ci.yaml'

# Cancel in-progress runs for the same PR when new commits are pushed
concurrency:
  group: tf-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    working-directory: terraform

jobs:
  terraform:
    name: Format, Validate & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: "1.15.2"
          terraform_wrapper: false

      - name: Terraform fmt (check)
        run: terraform fmt -check -recursive -diff

      # -backend=false: validation needs no remote state / AWS credentials.
      - name: Terraform init (no backend)
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate -no-color

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@eb0f7c1b77f191dee552664e7884849ce3dd5176 # v6
        with:
          tflint_version: latest

      - name: TFLint
        run: |
          tflint --init
          tflint --no-color -f compact
