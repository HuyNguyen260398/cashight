# HSTS is applied by Amplify Hosting in production only. Local HTTP development
# must continue to work, so it is intentionally absent from next.config.ts.
# Baseline security headers are emitted by Next.js to avoid duplicated header
# keys when Amplify serves SSR responses.
customHeaders:
  - pattern: '**/*'
    headers:
      - key: Strict-Transport-Security
        value: 'max-age=63072000; includeSubDomains; preload'
