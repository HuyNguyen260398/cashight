# HSTS is applied by Amplify Hosting in production only. Local HTTP development
# must continue to work, so it is intentionally absent from next.config.ts.
customHeaders:
  - pattern: '**/*'
    headers:
      - key: Strict-Transport-Security
        value: 'max-age=63072000; includeSubDomains; preload'
      - key: X-Content-Type-Options
        value: nosniff
      - key: Referrer-Policy
        value: strict-origin-when-cross-origin
      - key: X-Frame-Options
        value: DENY
      - key: Permissions-Policy
        value: 'camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=(), browsing-topics=()'
