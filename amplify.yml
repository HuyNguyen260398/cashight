version: 1
frontend:
  phases:
    preBuild:
      commands:
        - corepack enable
        - corepack prepare pnpm@11.2.2 --activate
        - pnpm install --frozen-lockfile
    build:
      commands:
        # Amplify's WEB_COMPUTE platform injects app/branch env vars into the BUILD
        # container only — they are NOT forwarded to the Next.js SSR runtime (Lambda).
        # Persist only runtime env vars still required at process start. Auth.js
        # provider/session secrets remain here as residual build-artifact risk
        # until a tested runtime-secret bootstrap replaces process-start reads.
        # GEMINI_API_KEY and PDF_PASSWORD are fetched from SSM at request time.
        - env | grep -E '^(STORAGE_REGION|STATEMENTS_BUCKET|GEMINI_API_KEY_PARAMETER|PDF_PASSWORD_PARAMETER|ALLOWED_EMAIL|AUTH_)' >> .env.production
        - pnpm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
