version: 1
frontend:
  phases:
    preBuild:
      commands:
        - corepack enable
        - corepack prepare pnpm@11.2.2 --activate
        - pnpm install --frozen-lockfile
    build:
      commands:
        # Amplify's WEB_COMPUTE platform injects app/branch env vars into the BUILD
        # container only — they are NOT forwarded to the Next.js SSR runtime (Lambda).
        # Persist the ones our server code reads into .env.production so Next.js bundles
        # them into the compute output and they exist in process.env at request time.
        - env | grep -E '^(STORAGE_REGION|STATEMENTS_BUCKET|GEMINI_API_KEY|PDF_PASSWORD|ALLOWED_EMAIL|AUTH_)' >> .env.production
        - pnpm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
